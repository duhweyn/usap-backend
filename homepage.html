<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USAP – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="homepage.css" />
</head>
<body>

  <!-- ══════════════ LEFT SIDEBAR ══════════════ -->
  <aside class="sidebar">
    <div class="sidebar-top">

      <!-- Logo -->
      <img src="USAP LOGO.svg" alt="USAP Logo" class="sidebar-logo" />

      <!-- Nav -->
      <nav class="nav">
        <a href="homepage.html" class="nav-item active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
            <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
            <path d="M9 21v-7h6v7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          Home
        </a>
        <a href="#" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Explore
        </a>
        <a href="#" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Notifications
        </a>
        <a href="#" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          Message
        </a>
      </nav>

      <!-- USAP button -->
      <button class="usap-nav-btn">USAP</button>
    </div>

    <!-- Profile -->
    <div class="sidebar-bottom">
      <div class="profile-row" id="profile-row">
        <div class="profile-avatar"></div>
        <div class="profile-info">
          <span class="profile-name" id="sidebar-username">username</span>
          <span class="profile-handle" id="sidebar-handle">@username</span>
        </div>
        <button class="dots-btn" id="dots-btn">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="logout-popup hidden" id="logout-popup">
        <button id="logout-btn">Log out <span id="logout-handle">@username</span></button>
        <div class="logout-tip"></div>
      </div>
    </div>
  </aside>

  <!-- ══════════════ MAIN FEED ══════════════ -->
  <main class="feed">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-foryou">For You</button>
      <button class="tab" id="tab-following">Following</button>
    </div>

    <!-- Post box (collapsed) -->
    <div class="post-box" id="post-box">
      <div class="post-box-row" id="post-collapsed">
        <div class="post-avatar-dark"></div>
        <button class="post-placeholder" id="open-composer">What's your USAP?</button>
        <div class="post-media-icons">
          <button class="media-btn" title="Photo"><svg viewBox="0 0 24 24" fill="none"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.8"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
          <button class="media-btn" title="Video"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M17 9l5-3v12l-5-3V9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
          <button class="media-btn" title="GIF"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M8.5 14v-4H6.5v4H8.5zM6.5 10h2M11 10v4M14.5 10H17v2h-2.5v2H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
          <button class="media-btn" title="Location"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/></svg></button>
        </div>
        <button class="usap-post-btn" id="usap-btn-collapsed">USAP</button>
      </div>

      <!-- Expanded composer -->
      <div class="composer hidden" id="composer">
        <div class="composer-top">
          <div class="post-avatar-dark"></div>
          <textarea class="composer-textarea" id="composer-text" placeholder="What's your USAP?" rows="3"></textarea>
        </div>
        <div class="composer-privacy-row">
          <button class="privacy-toggle" id="privacy-toggle">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" stroke="currentColor" stroke-width="2"/></svg>
            <span id="privacy-label">Everyone can reply</span>
          </button>
          <div class="privacy-menu hidden" id="privacy-menu">
            <button class="privacy-opt active" data-v="Everyone">Everyone</button>
            <button class="privacy-opt" data-v="Tropa Only">Tropa Only</button>
            <button class="privacy-opt" data-v="Accounts Mentioned">Accounts Mentioned</button>
          </div>
        </div>
        <div class="composer-footer">
          <div class="post-media-icons">
            <button class="media-btn" title="Photo"><svg viewBox="0 0 24 24" fill="none"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.8"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
            <button class="media-btn" title="Video"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M17 9l5-3v12l-5-3V9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
            <button class="media-btn" title="GIF"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M8.5 14v-4H6.5v4H8.5zM6.5 10h2M11 10v4M14.5 10H17v2h-2.5v2H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
            <button class="media-btn" title="Location"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/></svg></button>
          </div>
          <button class="usap-post-btn" id="submit-post">USAP</button>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div class="posts-area" id="posts-area">
      <!-- Skeleton shown when empty -->
      <!-- Skeleton shown when empty (Figma exact) -->
      <div id="skeleton-wrap">

        <!-- Loading Posts 615x284 -->
        <div class="sk-wrap">
          <svg width="615" height="284" viewBox="0 0 615 284" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto">
            <rect x="0.5" y="0.5" width="614" height="283" rx="14.5" stroke="white" stroke-opacity="0.5"/>
            <circle cx="40" cy="40" r="30" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="10"  width="101" height="60"  rx="15"   fill="white" fill-opacity="0.5"/>
            <rect x="85" y="85"  width="284" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="116" width="485" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="147" width="93"  height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="178" width="503" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="209" width="425" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="249" width="136" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
          </svg>
          <div class="sk-shimmer"></div>
        </div>

        <!-- Loading Posts Large 615x375 -->
        <div class="sk-wrap">
          <svg width="615" height="375" viewBox="0 0 615 375" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto">
            <rect x="0.5" y="0.5" width="614" height="374" rx="14.5" stroke="white" stroke-opacity="0.5"/>
            <circle cx="40" cy="40" r="30" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="10"  width="101" height="60"  rx="15"   fill="white" fill-opacity="0.5"/>
            <rect x="85" y="85"  width="284" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="116" width="485" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="147" width="93"  height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="178" width="503" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="209" width="425" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="240" width="503" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="271" width="425" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="302" width="503" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
            <rect x="85" y="340" width="136" height="25"  rx="12.5" fill="white" fill-opacity="0.5"/>
          </svg>
          <div class="sk-shimmer"></div>
        </div>

      </div>
      <!-- Actual posts injected here -->
    </div>
  </main>

  <!-- ══════════════ RIGHT PANEL ══════════════ -->
  <aside class="right-panel">
    <!-- Search -->
    <div class="search-wrap">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="7" stroke="white" stroke-width="2"/><path d="M16 16l-3-3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <input class="search-input" type="text" placeholder="Search" />
    </div>

    <!-- Notifications panel -->
    <div class="notif-panel">
      <div class="notif-empty" id="notif-empty">
        <svg viewBox="0 0 24 24" fill="none" width="34" height="34"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 01-3.46 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>Notifications will pop up here</p>
      </div>
      <div class="notif-list hidden" id="notif-list"></div>
    </div>

    <!-- Floating message btn -->
    <button class="msg-float" aria-label="Messages">
      <svg viewBox="0 0 40 37" fill="none" width="30" height="28"><path d="M2 2h36a2 2 0 012 2v25a2 2 0 01-2 2H2a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="black" stroke-width="2.5" stroke-linejoin="round"/><path d="M0 6l20 14L40 6" stroke="black" stroke-width="2.5" stroke-linejoin="round"/></svg>
    </button>
  </aside>

  <!-- ══════════════ COMMENT MODAL ══════════════ -->
  <div class="modal-backdrop hidden" id="comment-modal">
	  <div class="comment-modal-box">
		<button class="modal-close" id="close-comment-modal">
		  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
			<path d="M1 1l18 18M19 1L1 19" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
		  </svg>
		</button>
		<div class="comment-original" id="comment-original"></div>
		<div class="comment-list" id="comment-list">
		  <div class="comment-empty" id="comment-empty">No comments yet. Be the first!</div>
		</div>
		<div class="comment-composer">
		  <textarea class="comment-input" id="comment-input" placeholder="Reply..." rows="1"></textarea>
		  <button class="comment-send" id="comment-send">Reply</button>
		</div>
	  </div>
	</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="homepage.js"></script>
</body>
</html>
